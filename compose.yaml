name: school-oj

services:
  postgres:
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-oj}"
      POSTGRES_USER: "${POSTGRES_USER:-oj}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-ojpass}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oj -d oj"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    restart: unless-stopped
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    volumes:
      - minio-data:/data

  api:
    restart: unless-stopped
    build:
      context: ./apps/api
    environment:
      APP_ADDR: ":8080"
      GIN_MODE: "release"
      DATABASE_URL: "host=postgres user=${POSTGRES_USER:-oj} password=${POSTGRES_PASSWORD:-ojpass} dbname=${POSTGRES_DB:-oj} port=5432 sslmode=disable TimeZone=Asia/Shanghai"
      REDIS_ADDR: "redis:6379"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      MINIO_BUCKET: "${MINIO_BUCKET:-oj-artifacts}"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-1025}"
      SMTP_USERNAME: "${SMTP_USERNAME:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      MAIL_FROM: "${MAIL_FROM:-no-reply@huanghailuoj.local}"
      MAIL_FROM_NAME: "${MAIL_FROM_NAME:-黄海在线}"
      AUTO_MIGRATE: "true"
      SEED_DATA: "true"
      JPLAG_WORK_DIR: "/tmp/jplag"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "/usr/local/bin/api-healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 20

  worker:
    restart: unless-stopped
    build:
      context: ./apps/worker
    environment:
      DATABASE_URL: "host=postgres user=${POSTGRES_USER:-oj} password=${POSTGRES_PASSWORD:-ojpass} dbname=${POSTGRES_DB:-oj} port=5432 sslmode=disable TimeZone=Asia/Shanghai"
      REDIS_ADDR: "redis:6379"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      MINIO_BUCKET: "${MINIO_BUCKET:-oj-artifacts}"
      SANDBOX_WORK_ROOT: "${OJ_WORK_ROOT:-/tmp/school-oj-worker}"
      DOCKER_SANDBOX_SECCOMP: "${OJ_WORK_ROOT:-/tmp/school-oj-worker}/seccomp/oj-seccomp.json"
      SANDBOX_CPU: "1.0"
      SANDBOX_MEMORY_MB: "256"
      SANDBOX_PIDS: "128"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${OJ_WORK_ROOT:-/tmp/school-oj-worker}:${OJ_WORK_ROOT:-/tmp/school-oj-worker}

  web:
    restart: unless-stopped
    build:
      context: ./apps/web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-25565}:80"

volumes:
  postgres-data:
  redis-data:
  minio-data:
