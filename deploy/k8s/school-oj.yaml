apiVersion: v1
kind: Namespace
metadata:
  name: school-oj
---
apiVersion: v1
kind: Secret
metadata:
  name: school-oj-secret
  namespace: school-oj
type: Opaque
stringData:
  postgres-password: ojpass
  jwt-secret: change-me-in-production
  minio-access-key: minioadmin
  minio-secret-key: minioadmin
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: school-oj-config
  namespace: school-oj
data:
  database-url: host=postgres user=oj password=ojpass dbname=oj port=5432 sslmode=disable TimeZone=Asia/Shanghai
  redis-addr: redis:6379
  minio-endpoint: minio:9000
  minio-bucket: oj-artifacts
  smtp-host: smtp
  smtp-port: "1025"
  mail-from: no-reply@huanghailuoj.local
  mail-from-name: 黄海在线
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: school-oj
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: school-oj
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: oj
            - name: POSTGRES_USER
              value: oj
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: school-oj-secret
                  key: postgres-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: school-oj
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: school-oj
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: school-oj
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: school-oj
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: school-oj
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: school-oj
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
            - containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: school-oj-secret
                  key: minio-access-key
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: school-oj-secret
                  key: minio-secret-key
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: school-oj
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: school-oj
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: school-oj-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: APP_ADDR
              value: ":8080"
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: school-oj-config
                  key: database-url
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: school-oj-config
                  key: redis-addr
            - name: MINIO_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: school-oj-config
                  key: minio-endpoint
            - name: MINIO_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: school-oj-config
                  key: minio-bucket
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: school-oj-secret
                  key: minio-access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: school-oj-secret
                  key: minio-secret-key
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: school-oj-secret
                  key: jwt-secret
            - name: SMTP_HOST
              valueFrom:
                configMapKeyRef:
                  name: school-oj-config
                  key: smtp-host
            - name: SMTP_PORT
              valueFrom:
                configMapKeyRef:
                  name: school-oj-config
                  key: smtp-port
            - name: MAIL_FROM
              valueFrom:
                configMapKeyRef:
                  name: school-oj-config
                  key: mail-from
            - name: MAIL_FROM_NAME
              valueFrom:
                configMapKeyRef:
                  name: school-oj-config
                  key: mail-from-name
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: school-oj
spec:
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: school-oj
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: school-oj-worker:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: school-oj-config
                  key: database-url
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: school-oj-config
                  key: redis-addr
            - name: MINIO_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: school-oj-config
                  key: minio-endpoint
            - name: MINIO_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: school-oj-config
                  key: minio-bucket
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: school-oj-secret
                  key: minio-access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: school-oj-secret
                  key: minio-secret-key
            - name: DOCKER_SANDBOX_SECCOMP
              value: /tmp/school-oj-worker/seccomp/oj-seccomp.json
            - name: SANDBOX_WORK_ROOT
              value: /tmp/school-oj-worker
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run/docker.sock
            - name: sandbox-work
              mountPath: /tmp/school-oj-worker
      volumes:
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
        - name: sandbox-work
          hostPath:
            path: /tmp/school-oj-worker
            type: DirectoryOrCreate
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: school-oj
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: school-oj-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: school-oj
spec:
  type: LoadBalancer
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
